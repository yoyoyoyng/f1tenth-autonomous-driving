slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping
    use_sim_time: false

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 1.0
    resolution: 0.05
    restamp_tf: true
    min_laser_range: 0.0
    max_laser_range: 10.0
    minimum_time_interval: 0.1
    transform_timeout: 1.0
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true

    # [튜닝] 너무 자주 업데이트되면 노이즈 생김 → 0.05~0.2 사이로 조정
    minimum_travel_distance: 0.1   # 원래 0.02 → 10cm 움직일 때만 업데이트
    minimum_travel_heading: 0.1    # 원래 0.02 → 약 6도 회전할 때만 업데이트

    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1  
    link_scan_maximum_distance: 1.5

    # [튜닝] 루프 클로징 탐색 범위 확대
    loop_search_maximum_distance: 5.0      # 원래 3.0 → 더 넓게 루프 탐색

    do_loop_closing: true

    # [튜닝] 루프 클로징 감지 민감도
    loop_match_minimum_chain_size: 5       # 원래 10 → 더 빨리 루프 감지
    loop_match_maximum_variance_coarse: 3.0  

    # [튜닝] 루프 클로징 정확도 강화
    loop_match_minimum_response_coarse: 0.45   # 원래 0.35
    loop_match_minimum_response_fine: 0.55     # 원래 0.45

    # Correlation Parameters
    # [튜닝] 스캔 매칭 정밀도 향상
    correlation_search_space_dimension: 0.3    # 원래 0.5
    correlation_search_space_resolution: 0.005 # 원래 0.01 → 더 정밀하게
    correlation_search_space_smear_deviation: 0.03 

    # Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5      
    angle_variance_penalty: 1.0    
    fine_search_angle_offset: 0.00349     
    coarse_search_angle_offset: 0.349   
    coarse_angle_resolution: 0.0349        
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1
